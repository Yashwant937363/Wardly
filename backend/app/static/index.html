<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardly — Add Item</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 60px auto;
        padding: 0 16px;
      }
      h1 {
        font-size: 1.4rem;
      }
      label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
      }
      button {
        margin-top: 20px;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 16px;
        white-space: pre-wrap;
        font-size: 0.9rem;
      }
      #status.error {
        color: #b00020;
      }
      #status.success {
        color: #0a7a2f;
      }
    </style>
  </head>
  <body>
    <h1>Add a wardrobe item</h1>

    <form id="upload-form">
      <label for="file">Photo</label>
      <input type="file" id="file" accept="image/*" required />

      <button type="submit" id="submit-btn">Upload</button>
    </form>

    <div id="status"></div>

    <script>
      const form = document.getElementById("upload-form");
      const statusEl = document.getElementById("status");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fileInput = document.getElementById("file");
        const file = fileInput.files[0];

        if (!file) return;

        submitBtn.disabled = true;
        statusEl.className = "";
        statusEl.textContent =
          "Uploading and processing... this can take a few seconds.";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const response = await fetch("/api/items", {
            method: "POST",
            body: formData,
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(
              err.detail || `Request failed with status ${response.status}`,
            );
          }

          const document = await response.json();
          statusEl.className = "success";
          statusEl.textContent = "Saved:\n" + JSON.stringify(document, null, 2);
          form.reset();
        } catch (err) {
          statusEl.className = "error";
          statusEl.textContent = "Error: " + err.message;
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
